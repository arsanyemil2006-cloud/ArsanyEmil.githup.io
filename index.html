<!DOCTYPE html>
<html>
<head>
  <meta charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/style.css"/>
  <title>Login | CarZone</title>
</head>
<body>
    <header>
    <nav>
      <h1>Car<span>Zone</span></h1>
      <ul>
        <li><a href="home.html" >home</a></li>
        <li><a href="cars.html" >Cars</a></li>
        <li><a href="offers.html">Today's Deals</a></li>
        <li><a href="compare.html">Compare</a></li>
        <li><a href="news.html">News</a></li>
        <li><a href="about.html" >About Us</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="index.html" class="active">Login</a></li>
        <button class="btntoogle" onclick="toggleTheme()">🌙/☀️</button>

      </ul>
    </nav>
    
  </header>
  <main>
    <div class="container">
        <div class="form-box">
            <!-- Branding -->
            <div class="brand">
                
                <h1>Car<span>Zone</span></h1>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="input-group">
                <h2>Welcome Back</h2>
                <div id="login-error" class="error-message" style="display: none;"></div>
                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn">Login</button>
                <p class="formp">New to Car Zone? <a href="#signup-form" id="show-signup">Create Account</a></p>
            </form>

            <!-- Sign Up Form (Hidden by default) -->
            <form id="signup-form" class="input-group hidden">
                <h2>Join the Club</h2>
                <div id="signup-error" class="error-message" style="display: none;"></div>
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signup-pass" placeholder="Password" required>
                </div>
                <button type="submit" class="btn">Sign Up</button>
                <p class="formp">Already a member? <a href="#" id="show-login">Sign In</a></p>
            </form>
        </div>
    </div>
    </main>
    <footer>
    <p>&copy 2026 CarZone | All Rights Reserved</p>
  </footer>

    
<script src="scripts/js.js"></script>
</body>
</html>
